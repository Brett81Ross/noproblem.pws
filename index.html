<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No Problem Power Washing - Auto Estimator</title>
    <style>
        body {

            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .logo-container {
            margin-top: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 100px;
            display: block;
        }
        .brand-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            color: #ffffff;
        }
        .brand-title span {
            color: #00b4d8;
        }
        .tagline {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            padding: 0 10px;
            margin-bottom: 30px;
        }
        .action-card {
            background-color: #1c2541;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #3a506b;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #00b4d8;
            color: #0b132b;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .btn:active {
            background-color: #0096c7;
        }
        .btn-secondary {
            background-color: #3a506b;
            color: #ffffff;
            margin-bottom: 0;
            border: 1px solid #5c718e;
        }
        .btn-secondary:active {
            background-color: #24334c;
        }
        .hidden-input {
            display: none;
        }
        .result-card {
            background-color: #1c2541;
            border-left: 4px solid #00b4d8;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            position: relative;
        }
        .result-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: bold;
        }
        .copy-btn {
            background-color: #0b132b;
            color: #00b4d8;
            border: 1px solid #3a506b;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .result-text {
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
            color: #f8fafc;
        }
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

        <div class="logo-container">
            <img src="logo6.png" alt="No Problem Power Washing Logo">
        </div>

            Snap photos or upload multiple images of a job site. The AI automatically scans all structures, identifies surfaces, and calculates your full bidding quote.
