            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            background-color: #0056b3; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 25px; 
            cursor: pointer; 
        }
        button:active { 
            background-color: #004494; 
        }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #e9ecef; 
            border-radius: 6px; 
            text-align: center; 
        }
        .result h2 { 
            margin: 0;

        }
